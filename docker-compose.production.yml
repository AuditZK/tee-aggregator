version: '3.8'

services:
  enclave:
    build:
      context: .
      # OPS-AUDIT-001: must be Dockerfile.production — the generic Dockerfile
      # does NOT bundle snpguest, so attestation would silently fall back to
      # PlatformUnattestedDev and every signed report would carry attested=false.
      dockerfile: Dockerfile.production
    container_name: enclave_go_prod
    user: root
    ports:
      - "3060:3060"
      - "50061:50061"
      - "50062:50062"
    env_file:
      - .env.production
    environment:
      - ENV=production
      - GRPC_PORT=50061
      # PORT-001: must match the container-side port in the 3060:3060 mapping
      # below. Without this the REST listener falls back to config.go default
      # 8080, which is not exposed on the host — the port forward looks open
      # at the Docker layer but nothing answers.
      - REST_PORT=3060
      - DATABASE_URL=${DATABASE_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      # CFG-001: required in production. The enclave fatals on startup if
      # this is empty; use the `:?` form so Docker also refuses to render
      # the compose file without the env var set.
      - ENCLAVE_JWT_SECRET=${ENCLAVE_JWT_SECRET:?ENCLAVE_JWT_SECRET is required}
      # CFG-002: required in production — CORS and gRPC mTLS allowlist.
      - CORS_ORIGIN=${CORS_ORIGIN:?CORS_ORIGIN is required}
      - GRPC_CLIENT_CERT_CN_ALLOWLIST=${GRPC_CLIENT_CERT_CN_ALLOWLIST:?GRPC_CLIENT_CERT_CN_ALLOWLIST is required}
      # PERF-002: tell the Go runtime about the 512 MiB cgroup cap so the GC
      # can target it instead of computing its heap goal from the host's
      # (much larger) RAM. 480 MiB leaves a 32 MiB buffer below mem_limit so
      # the kernel OOM-killer doesn't fire before the runtime can react.
      - GOMEMLIMIT=480MiB
      # GOGC=75 trades a modest CPU bump for ~25% lower steady-state heap,
      # justified under the tight 512 MiB cap.
      - GOGC=75
      # GOTRACEBACK=single keeps panic dumps focused on the failing goroutine
      # so we don't bury operators in 50+ goroutine traces under SSE load.
      - GOTRACEBACK=single
      # TLS-001: point the REST listener at the Let's Encrypt cert mounted from
      # the host. Without these, config.go falls back to /app/certs/cert.pem
      # (the self-signed dev cert baked into the image) and browsers reject
      # https://enclave.auditzk.com:3060 with ERR_CERT_AUTHORITY_INVALID.
      - TLS_CERT_PATH=/etc/letsencrypt/live/${ENCLAVE_DOMAIN:-enclave.auditzk.com}/fullchain.pem
      - TLS_KEY_PATH=/etc/letsencrypt/live/${ENCLAVE_DOMAIN:-enclave.auditzk.com}/privkey.pem
      # MT5-001: required for MetaTrader sync. Without this the connector
      # falls back to http://mt-bridge:8090 (a Docker-internal service name
      # that doesn't resolve on this host), and every MT5 sync fails with
      # "lookup mt-bridge on 127.0.0.11:53: server misbehaving".
      - MT_BRIDGE_URL=${MT_BRIDGE_URL:?MT_BRIDGE_URL is required (mt-bridge HTTP endpoint, e.g. https://mt-bridge.example.com:8443)}
      # MT5-002: HMAC-SHA256 secret used to sign requests to mt-bridge. Must
      # match the value configured on the mt-bridge side. Without it, every
      # request is rejected with `401 AUTH_FAILED Invalid signature`.
      - MT_BRIDGE_HMAC_SECRET=${MT_BRIDGE_HMAC_SECRET:?MT_BRIDGE_HMAC_SECRET is required (must match mt-bridge config)}
      # OPS-001: log verbosity. Defaults to info; set to debug to enable
      # request-level traces (noisy under SSE load).
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # OPS-002: explicit safety flags previously set by start-enclave.sh.
      # AUTO_MIGRATE=false prevents the enclave from running schema migrations
      # on its own — those go through a separate migration step.
      - AUTO_MIGRATE=false
      # OPS-003: daily snapshot scheduler. The scheduler defaults to enabled
      # in code, but pin it explicitly so a config drift can't silently
      # disable the entire sync pipeline.
      - ENABLE_DAILY_SYNC=true
      # SEC-003: gRPC must run with TLS (no plaintext) since gateway-service
      # connects from outside the host.
      - GRPC_INSECURE=false
      # mTLS-001: paths to the mTLS material used for gRPC Gateway↔Enclave.
      # These are mounted from ./certs:/etc/enclave:ro below. Without them
      # the gRPC server can't validate gateway client certs.
      - TLS_CA_CERT=/etc/enclave/ca.crt
      - TLS_SERVER_CERT=/etc/enclave/server.crt
      - TLS_SERVER_KEY=/etc/enclave/server.key
    # SEV-SNP device access (AMD confidential computing)
    devices:
      - /dev/sev-guest:/dev/sev-guest
    volumes:
      - /usr/local/bin/snpguest:/usr/local/bin/snpguest:ro
      - enclave_vcek_cache:/var/cache/enclave/certs:rw
      - ./certs:/etc/enclave:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    security_opt:
      - label=disable
    privileged: true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO/dev/null https://localhost:3060/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

networks:
  default:
    external: true
    name: zero-knowledge-aggregator-go-test_default

volumes:
  enclave_vcek_cache:
