# Parallel TEST stack — runs ALONGSIDE enclave_go_prod on the same TEE
# VPS without touching prod state. Brings up:
#
#   - enclave_go_test          — the aggregator (this repo, Dockerfile dev)
#   - enclave_test_db          — its dedicated postgres (snapshot_data lives here)
#   - history_rebuilder_test   — the external rebuilder (track_record_site/
#                                history-rebuilder-go), built from a sibling
#                                repo. Stateless w.r.t. user data: receives
#                                creds via /history/rebuild and returns
#                                snapshots in the response. The aggregator
#                                writes them to enclave_test_db.
#   - rebuilder_cache_db_test  — tiny postgres just for the rebuilder's
#                                cross-user OHLCV cache (non-user data).
#
# Zero overlap with prod (docker-compose.production.yml):
#   - Container names:  *_test  (prod: enclave_go_prod)
#   - Network:          fresh `tee_test` bridge
#   - Host ports:       127.0.0.1:8443 / 50063 / 5441 / 8084 / 5442
#                       (prod: 0.0.0.0:443 / 50061 / 50062, no DB container)
#   - Image:            built from `Dockerfile` (NOT Dockerfile.production)
#                       — bypasses snpguest + SEV-SNP attestation, so the
#                       enclave runs as `unattested-dev`. Acceptable for an
#                       integration test (we are NOT validating signed
#                       reports here).
#   - Devices/caps:     none. Prod mounts /dev/sev-guest + privileged.
#
# Usage on tee-milan-01:
#
#   # 0. one-time: clone the rebuilder repo as a sibling of this checkout
#   #    (override path via REBUILDER_REPO_PATH if it lives elsewhere).
#   git clone https://github.com/AuditZK/track_record_site.git ~/trackrecord
#
#   # 1. one-time: generate self-signed TLS material for the REST listener
#   mkdir -p certs-test
#   openssl req -x509 -newkey rsa:2048 -nodes -days 365 \
#     -keyout certs-test/key.pem -out certs-test/cert.pem \
#     -subj "/CN=localhost" \
#     -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"
#   chmod 644 certs-test/*.pem
#
#   # 2. bring up
#   REBUILDER_REPO_PATH=~/trackrecord/history-rebuilder-go \
#     docker compose -f docker-compose.test-enclave.yml up -d --build
#
#   # 3. verify isolation — prod must still be healthy
#   docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
#
#   # 4. wipe (prod containers untouched)
#   docker compose -f docker-compose.test-enclave.yml down -v
#
# The enclave defaults to talking to the in-network test rebuilder
# (REBUILDER_SERVICE_URL=http://history_rebuilder_test:8080). Override
# by exporting REBUILDER_URL=... before `up` to point elsewhere — empty
# disables the hook entirely (rebuild_history:true becomes a silent
# no-op, SEC-ZK-001 perimeter intact).

services:
  enclave-test-db:
    image: postgres:16-alpine
    container_name: enclave_test_db
    environment:
      POSTGRES_USER: enclave
      POSTGRES_PASSWORD: enclave
      POSTGRES_DB: enclave_test
    ports:
      - "127.0.0.1:5441:5432"
    volumes:
      - enclave-test-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enclave -d enclave_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tee_test

  rebuilder-cache-db:
    image: postgres:16-alpine
    container_name: rebuilder_cache_db_test
    environment:
      POSTGRES_USER: rebuilder
      POSTGRES_PASSWORD: rebuilder
      POSTGRES_DB: rebuilder_cache
    ports:
      - "127.0.0.1:5442:5432"
    volumes:
      - rebuilder-cache-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rebuilder -d rebuilder_cache"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tee_test

  test-rebuilder:
    build:
      # Override via REBUILDER_REPO_PATH=... if the rebuilder repo lives
      # elsewhere. Default: a sibling clone of trackrecord at
      # ../trackrecord/history-rebuilder-go.
      context: ${REBUILDER_REPO_PATH:-../trackrecord/history-rebuilder-go}
      dockerfile: Dockerfile
    image: history-rebuilder-go:test
    container_name: history_rebuilder_test
    restart: unless-stopped
    environment:
      PORT: 8080
      LOG_LEVEL: debug
      # Cache-only DB (no user data lives here — see the rebuilder's
      # 001_init.sql, which now provisions exchange_ohlcv only).
      NEON_DATABASE_URL: postgres://rebuilder:rebuilder@rebuilder-cache-db:5432/rebuilder_cache?sslmode=disable
      REBUILDER_AUTH_MODE: shared-secret
      # Test-only token. Must match REBUILDER_INTERNAL_TOKEN below.
      REBUILDER_INTERNAL_TOKEN: ${REBUILDER_TOKEN:-test-token-abc123def456ghi789jkl012mno345}
      CORS_ORIGIN: "*"
    ports:
      # Loopback only — host-side port for direct curl smoke tests.
      - "127.0.0.1:8084:8080"
    depends_on:
      rebuilder-cache-db:
        condition: service_healthy
    networks:
      - tee_test

  enclave-test:
    build:
      context: .
      dockerfile: Dockerfile
    image: enclave-go:test
    container_name: enclave_go_test
    restart: unless-stopped
    environment:
      ENV: development
      LOG_LEVEL: debug
      DATABASE_URL: postgres://enclave:enclave@enclave-test-db:5432/enclave_test?sslmode=disable
      # 32-byte hex (64 chars). Synthetic, throwaway — DEK derivation in
      # this test stack uses no real master key and the DB is ephemeral.
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      ENCLAVE_JWT_SECRET: test-jwt-secret-not-for-prod-use-only-pad
      AUTO_MIGRATE: "true"
      ENABLE_DAILY_SYNC: "false"
      ENABLE_LEGACY_REST: "true"
      GRPC_INSECURE: "true"
      CORS_ORIGIN: "*"
      TLS_CERT_PATH: /app/certs/cert.pem
      TLS_KEY_PATH: /app/certs/key.pem
      # In-network rebuilder. Override REBUILDER_URL=http://... at compose
      # time to point elsewhere; export REBUILDER_URL="" to disable the
      # post-create hook entirely (rebuild_history:true becomes a silent
      # no-op, SEC-ZK-001 perimeter intact).
      REBUILDER_SERVICE_URL: ${REBUILDER_URL-http://history_rebuilder_test:8080}
      REBUILDER_INTERNAL_TOKEN: ${REBUILDER_TOKEN:-test-token-abc123def456ghi789jkl012mno345}
    ports:
      - "127.0.0.1:8443:8080"
      - "127.0.0.1:50063:50051"
    volumes:
      - ./certs-test:/app/certs:ro
    depends_on:
      enclave-test-db:
        condition: service_healthy
      test-rebuilder:
        condition: service_started
    networks:
      - tee_test

networks:
  tee_test:
    driver: bridge

volumes:
  enclave-test-db-data:
  rebuilder-cache-db-data:
